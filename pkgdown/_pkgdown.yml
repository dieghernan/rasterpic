url: https://dieghernan.github.io/rasterpic

template:
  bootstrap: 5
  package: gitdevr
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

home:
  title: rasterpic | Convert digital images into SpatRaster objects
  description: >
    Create **terra** `SpatRaster` objects from digital images. Use spatial
    input classes from **sf**, **terra** or **stars**, or numeric coordinate
    vectors, as geographic references. Local image files and image URLs are
    supported.

