      creator: "@dhernangomez"
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

home:
  title: rasterpic | Convert digital images into geotagged SpatRaster objects
  description: >
    Geotag digital images and return **terra** `SpatRaster` objects using
    coordinates from supported spatial inputs, including **sf**, **terra** or
    **stars** classes and numeric coordinate vectors. Local image files and
    image URLs are supported.

