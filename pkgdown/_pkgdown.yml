url: https://dieghernan.github.io/rasterpic

template:
  bootstrap: 5
  package: gitdevr
  opengraph:
    twitter:
      creator: "@dhernangomez"
      card: summary_large_image

development:
  mode: auto

repo:
  branch: main

authors:
  Diego Hernangómez:
    href: https://dieghernan.github.io/

home:
  title: rasterpic | Convert digital images into geotagged SpatRaster objects
  description: >
    Geotag digital images and return **terra** `SpatRaster` objects using
    coordinates from supported spatial input classes, including numeric
    coordinate vectors and objects from **sf**, **terra** and **stars**. Local
    image files and image URLs are supported.

reference:
- title: Geotagging images
  desc: >
    Create geotagged `SpatRaster` objects from supported spatial input classes
    and local image files or image URLs.
- contents:
  - rasterpic_img

- title: Package metadata
  desc: >
    Package-level documentation and metadata.
- contents:
  - rasterpic-package

- title: External plotting helpers
  desc: >
    Functions from other packages that are commonly used to plot the
    `SpatRaster` objects returned by `rasterpic_img()`.
- contents:
  - terra::plotRGB()
  - tidyterra::geom_spatraster_rgb()
  - tmap::tm_rgb()
  - mapsf::mf_raster()
  - maptiles::plot_tiles()

external-articles:
- name: beautiful-maps-flags
  title: "Beautiful maps with R (IV): Fun with flags revisited"
  description: >
    Blog post showing how to use rasterpic to add flag images to maps.
  href: https://dieghernan.github.io/202201_maps-flags/
- name: quick-brazil
  title: Quick Brazil
  description: >
    Short example that uses rasterpic to place the Brazilian flag on a map.
  href: https://x.com/dhernangomez/status/1486666356544225281

articles:
- title: Get started
  desc: >
    Learn how to geotag an image and control its placement, extent and mask.
  contents:
  - rasterpic

- title: Plotting geotagged images
  desc: >
    Compare plotting approaches for the resulting `SpatRaster` objects.
  navbar: Articles
  contents:
  - articles/plots

- title: External examples
  desc: >
    External posts and examples that use rasterpic.
  navbar: Examples
  contents:
  - beautiful-maps-flags
  - quick-brazil
