reference:
- title: Core geotagging
  desc: >
    Convert images into geotagged `SpatRaster` objects.
  contents: rasterpic_img
- title: Package metadata
  contents: rasterpic-package
- title: Plotting helpers
  desc: >
    Functions from other packages for plotting `SpatRaster` objects.
  contents:
  - terra::plotRGB()
  - tidyterra::geom_spatraster_rgb()
  - tmap::tm_rgb()
  - mapsf::mf_raster()
  - maptiles::plot_tiles()

